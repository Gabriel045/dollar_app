<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dolar VE en Vivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-a: #f8f4ec;
        --bg-b: #f4e6d8;
        --ink: #1f2a36;
        --ink-soft: #5a6672;
        --card: #fff8ef;
        --card-border: #dfd0bf;
        --accent: #0e8a72;
        --accent-strong: #0a6856;
        --error: #9f2f2f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 8% 15%, #fff9f2 0%, transparent 40%),
          radial-gradient(circle at 88% 10%, #f7dec0 0%, transparent 45%),
          linear-gradient(145deg, var(--bg-a), var(--bg-b));
      }

      .shell {
        width: min(980px, 92vw);
        margin: 44px auto;
        animation: rise 520ms ease-out;
      }

      .top {
        display: flex;
        gap: 14px;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-family: "Bitter", serif;
        font-size: clamp(1.5rem, 4.2vw, 2.6rem);
        letter-spacing: 0.01em;
      }

      .sub {
        margin-top: 8px;
        color: var(--ink-soft);
      }

      .panel {
        background: color-mix(in oklab, var(--card) 88%, white);
        border: 1px solid var(--card-border);
        border-radius: 18px;
        padding: 14px;
        box-shadow: 0 12px 24px rgba(55, 43, 24, 0.08);
      }

      #status {
        color: var(--ink-soft);
        min-height: 24px;
      }

      #status.error {
        color: var(--error);
      }

      .grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 14px;
      }

      .card {
        background: #fffcf6;
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 16px;
        opacity: 0;
        transform: translateY(12px);
        animation: cardIn 500ms ease forwards;
      }

      .tag {
        text-transform: uppercase;
        color: var(--ink-soft);
        letter-spacing: 0.08em;
        font-size: 0.75rem;
      }

      .name {
        margin-top: 4px;
        font-size: 1.3rem;
        font-weight: 700;
      }

      .price {
        margin-top: 14px;
        font-size: 2rem;
        font-family: "Bitter", serif;
        color: var(--accent-strong);
      }

      .meta {
        margin-top: 10px;
        font-size: 0.9rem;
        color: var(--ink-soft);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 10px;
        font-family: "Space Grotesk", sans-serif;
        background: linear-gradient(120deg, var(--accent), var(--accent-strong));
        color: #fff;
        font-weight: 700;
        padding: 10px 14px;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.05);
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
      }

      @keyframes cardIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 640px) {
        .top {
          flex-direction: column;
          align-items: flex-start;
        }

        .actions {
          width: 100%;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="top">
        <div>
          <h1>Dolar Venezuela</h1>
        </div>
        <div class="actions">
          <button id="reload" type="button">Actualizar ahora</button>
        </div>
      </section>

      <section class="panel">
        <div id="status">Cargando cotizaciones...</div>
        <div id="cards" class="grid" aria-live="polite"></div>
      </section>
    </main>

    <script>
      const ENDPOINT = "https://ve.dolarapi.com/v1/dolares";
      const cardsNode = document.getElementById("cards");
      const statusNode = document.getElementById("status");
      const reloadNode = document.getElementById("reload");

      function formatAmount(amount) {
        if (amount === null || amount === undefined || Number.isNaN(Number(amount))) {
          return "No disponible";
        }

        return `${new Intl.NumberFormat("es-VE", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        }).format(Number(amount))} Bs`;
      }

      function formatDate(iso) {
        if (!iso) return "Sin fecha";

        const date = new Date(iso);
        return new Intl.DateTimeFormat("es-VE", {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(date);
      }

      function setStatus(message, isError = false) {
        statusNode.textContent = message;
        statusNode.classList.toggle("error", isError);
      }

      function drawCards(rows) {
        cardsNode.innerHTML = "";

        rows.forEach((row, idx) => {
          const card = document.createElement("article");
          card.className = "card";
          card.style.animationDelay = `${idx * 80}ms`;
          card.innerHTML = `
            <div class="tag">${row.fuente ?? "sin-fuente"}</div>
            <div class="name">${row.nombre ?? "Sin nombre"}</div>
            <div class="price">${formatAmount(row.promedio)}</div>
            <div class="meta">Actualizado: ${formatDate(row.fechaActualizacion)}</div>
          `;
          cardsNode.appendChild(card);
        });
      }

      async function loadDollarRates() {
        setStatus("Actualizando datos...");

        try {
          const response = await fetch(ENDPOINT, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Error HTTP ${response.status}`);
          }

          const data = await response.json();
          if (!Array.isArray(data)) {
            throw new Error("La API no devolvio un arreglo");
          }

          drawCards(data);

          const latest = data
            .map((item) => new Date(item.fechaActualizacion).getTime())
            .filter((time) => Number.isFinite(time))
            .sort((a, b) => b - a)[0];

          const text = latest
            ? `Ultima sincronizacion: ${formatDate(new Date(latest).toISOString())}`
            : "Datos cargados";

          const checkedAt = new Intl.DateTimeFormat("es-VE", {
            timeStyle: "medium",
          }).format(new Date());

          setStatus(`${text} | Consulta local: ${checkedAt}`);
        } catch (error) {
          setStatus(`No se pudo cargar la API. ${error.message}`, true);
        }
      }

      reloadNode.addEventListener("click", loadDollarRates);
      loadDollarRates();
    </script>
  </body>
</html>
